<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimarket Ahgusto</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --sidebar-width: 260px; }
        body { font-family: 'Poppins', sans-serif; margin: 0; display: flex; background-color: #fdfaf5; color: #333; scroll-behavior: smooth; }

        /* Barra Lateral */
        nav { width: var(--sidebar-width); height: 100vh; background: white; border-right: 1px solid #eee; position: fixed; padding: 20px 0; z-index: 10; overflow-y: auto; }
        .logo-nav { width: 40px; margin: 0 auto 20px; display: block; }
        nav ul { list-style: none; padding: 0; margin: 0; }
        nav ul li { padding: 12px 30px; font-size: 0.85rem; font-weight: 600; color: #333; text-transform: uppercase; cursor: pointer; border-left: 4px solid transparent; transition: 0.2s; }
        nav ul li:hover, nav ul li.active { background: #fff8ef; border-left: 4px solid #d4a373; color: #d4a373; }

        /* Contenido Principal */
        .container { margin-left: var(--sidebar-width); width: 100%; padding: 40px; box-sizing: border-box; }

        .hero-banner { 
            background: repeating-linear-gradient(90deg, #00468b, #00468b 20px, #ffffff 20px, #ffffff 40px); 
            height: 180px; display: flex; justify-content: center; align-items: center; margin-bottom: 50px; border-radius: 4px;
        }
        .logo-principal { background: #f1c40f; padding: 20px; border-radius: 50%; border: 4px solid #d35400; width: 150px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        .categoria-bloque { display: none; margin-bottom: 60px; }
        .categoria-titulo { font-size: 1.2rem; font-weight: 700; text-transform: uppercase; margin-bottom: 25px; color: #111; border-bottom: 2px solid #eee; padding-bottom: 10px; }

        .grid-productos { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center; min-height: 350px; }
        
        .precio-tag { background: #1a3c5a; color: white; padding: 4px 12px; border-radius: 5px; font-weight: 700; font-size: 0.9rem; margin-bottom: 10px; }
        
        /* Contenedor de Imagen Fijo */
        .img-wrapper { width: 120px; height: 120px; margin: 10px 0; background: #f9f9f9; border-radius: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .img-producto { max-width: 100%; max-height: 100%; object-fit: contain; }

        .stock-tag { padding: 3px 10px; border-radius: 10px; font-size: 0.75rem; font-weight: 700; margin-bottom: 10px; width: 80%; }
        .con-stock { background: #ffede0; color: #e67e22; }
        .sin-stock { background: #ffebee; color: #d32f2f; }

        .card h3 { font-size: 0.8rem; font-weight: 600; margin: 10px 0; color: #444; min-height: 40px; line-height: 1.2; text-transform: capitalize; }
        .btn-pago { background: #a8dadc; color: #1d3557; border: none; padding: 8px 15px; border-radius: 5px; font-weight: 700; font-size: 0.7rem; cursor: pointer; width: 100%; margin-top: auto; }
        
        #bienvenida { text-align: center; padding: 50px; }
    </style>
</head>
<body>

    <nav>
        <img src="logo.png" class="logo-nav" onerror="this.style.display='none'">
        <ul id="menu-categorias">
            <li class="active" id="btn-inicio" onclick="mostrarInicio()">🏠 Inicio</li>
        </ul>
    </nav>

    <div class="container">
        <div class="hero-banner">
            <div class="logo-principal">
                <h2 style="margin:0; color:#d35400; font-size: 1rem;">Ah Gusto</h2>
                <small style="font-weight:700;">MULTIMARKET</small>
            </div>
        </div>

        <div id="bienvenida">
            <h2>Panel de Control Ahgusto</h2>
            <p>Selecciona una categoría para gestionar tus productos.</p>
        </div>

        <div id="contenedor-tienda"></div>
    </div>

    <script>
        let inventario = [];

        async function cargarTienda() {
            try {
                const respuesta = await fetch('datosproductos.json');
                inventario = await respuesta.json();
                
                const grupos = {};
                inventario.forEach(p => {
                    const cat = p.Categoría || p.CATEGORIA || "General";
                    if (!grupos[cat]) grupos[cat] = [];
                    grupos[cat].push(p);
                });

                const tienda = document.getElementById('contenedor-tienda');
                const menu = document.getElementById('menu-categorias');

                for (const cat in grupos) {
                    const li = document.createElement('li');
                    li.textContent = cat;
                    li.onclick = () => filtrarPorCategoria(cat, li);
                    menu.appendChild(li);

                    const seccion = document.createElement('div');
                    seccion.className = 'categoria-bloque';
                    seccion.id = `seccion-${cat}`;
                    seccion.innerHTML = `<h2 class="categoria-titulo">${cat}</h2>`;
                    
                    const grid = document.createElement('div');
                    grid.className = 'grid-productos';

                    grupos[cat].forEach(p => {
                        const stock = parseInt(p.Stock) || 0;
                        const stockClase = stock > 0 ? 'con-stock' : 'sin-stock';
                        const nombreProd = p.NOMBRE || p.Nombre || "Producto";
                        const barras = p.Código || p.CODIGO || "";
                        
                        // PRECIO
                        const precioRaw = p["P.Venta"] || p.P_Venta || p.precio || "0.00";
                        const precioFormateado = precioRaw.toString().includes('S/') ? precioRaw : `S/ ${precioRaw}`;

                        // IMAGEN POR API DE CÓDIGO DE BARRAS (Mucho más estable que Google)
                        // Si no hay barras, usa un icono de caja de mercado
                        const urlImg = barras.length > 5 
                            ? `https://world.openfoodfacts.org/images/products/${barras}/front_es.400.jpg` 
                            : `https://cdn-icons-png.flaticon.com/512/3081/3081840.png`;

                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <div class="precio-tag">${precioFormateado}</div>
                            <div class="img-wrapper">
                                <img class="img-producto" 
                                     src="${urlImg}" 
                                     onerror="this.src='https://cdn-icons-png.flaticon.com/512/3081/3081840.png'"
                                     alt="producto">
                            </div>
                            <div class="stock-tag ${stockClase}">${stock > 0 ? 'Stock: '+stock : 'Sin stock'}</div>
                            <h3>${nombreProd}</h3>
                            <button class="btn-pago">VER DETALLES</button>
                        `;
                        grid.appendChild(card);
                    });
                    seccion.appendChild(grid);
                    tienda.appendChild(seccion);
                }
            } catch (err) { console.error("Error:", err); }
        }

        function filtrarPorCategoria(cat, elemento) {
            document.getElementById('bienvenida').style.display = 'none';
            document.querySelectorAll('.categoria-bloque').forEach(b => b.style.display = 'none');
            document.querySelectorAll('nav ul li').forEach(i => i.classList.remove('active'));
            
            const target = document.getElementById(`seccion-${cat}`);
            if(target) target.style.display = 'block';
            elemento.classList.add('active');
            window.scrollTo(0,0);
        }

        function mostrarInicio() {
            document.getElementById('bienvenida').style.display = 'block';
            document.querySelectorAll('.categoria-bloque').forEach(b => b.style.display = 'none');
            document.querySelectorAll('nav ul li').forEach(i => i.classList.remove('active'));
            document.getElementById('btn-inicio').classList.add('active');
        }

        cargarTienda();
    </script>
</body>
</html>
