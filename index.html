<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimarket Ahgusto</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 250px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            background-color: #fdfaf5; /* El color crema de tu diseño */
            color: #333;
        }

        /* Tu Barra Lateral Original */
        nav {
            width: var(--sidebar-width);
            height: 100vh;
            background: white;
            border-right: 1px solid #eee;
            position: fixed;
            padding: 20px 0;
            z-index: 10;
        }

        .logo-nav {
            width: 80px;
            margin: 0 auto 30px;
            display: block;
        }

        nav ul { list-style: none; padding: 0; margin: 0; }
        nav ul li {
            padding: 15px 30px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #333;
            text-transform: uppercase;
            cursor: pointer;
        }
        nav ul li.active { background: #f9f1e4; border-right: 4px solid #d4a373; }

        /* Contenido Principal */
        .container {
            margin-left: var(--sidebar-width);
            width: 100%;
            padding: 40px;
        }

        /* El Banner de Rayas y Logo que tenías */
        .hero-banner {
            background: repeating-linear-gradient(90deg, #00468b, #00468b 20px, #ffffff 20px, #ffffff 40px);
            padding: 40px;
            border-radius: 0;
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }

        .logo-grande {
            background: #f1c40f; /* El amarillo del logo Ah Gusto */
            padding: 30px;
            border-radius: 50%;
            border: 4px solid #d35400;
            text-align: center;
            width: 200px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Buscador */
        .search-box {
            width: 100%;
            max-width: 600px;
            padding: 15px;
            margin: 0 auto 40px;
            display: block;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 1rem;
        }

        /* Grid de tus tarjetas originales */
        .grid-productos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .card h3 { font-size: 1.1rem; color: #333; margin: 15px 0; height: 50px; }
        .card .precio { font-size: 1.4rem; font-weight: 700; color: #27ae60; margin-bottom: 20px; }
        
        .btn-ver {
            background: #a8dadc;
            color: #1d3557;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <nav>
        <img src="https://multimarketahgusto.github.io/logo.png" class="logo-nav" onerror="this.style.display='none'">
        <ul>
            <li class="active">Inicio</li>
            <li>Productos</li>
            <li>Ofertas</li>
            <li>Sobre Nosotros</li>
            <li>Contacto</li>
        </ul>
    </nav>

    <div class="container">
        <div class="hero-banner">
            <div class="logo-grande">
                <h2 style="margin:0; color:#d35400;">Ah Gusto</h2>
                <small style="color:#333;">MULTIMARKET</small>
            </div>
        </div>

        <input type="text" id="buscador" class="search-box" placeholder="¿Qué estás buscando hoy?">

        <div class="grid-productos" id="lista-p">
            </div>
    </div>

    <script>
        let inventario = [];

        async function cargar() {
            try {
                const res = await fetch('datosproductos.json');
                inventario = await res.json();
                render(inventario);
            } catch (e) { console.log("Error", e); }
        }

        function render(datos) {
            const list = document.getElementById('lista-p');
            list.innerHTML = '';
            
            datos.forEach(p => {
                // CORRECCIÓN CLAVE: Busca nombres de columnas tal como salen de Excel (MAYÚSCULAS)
                const nombre = p.NOMBRE || p.Nombre || p.nombre || "Sin Nombre";
                const precio = p.PVenta || p.P_VENTA || p.P_Venta || p.precio || 0;
                const codigo = p.Código || p.CODIGO || p.codigo || "S/N";

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <small style="color:#aaa">Ref: ${codigo}</small>
                    <h3>${nombre}</h3>
                    <div class="precio">S/ ${parseFloat(precio).toFixed(2)}</div>
                    <button class="btn-ver">VER MÁS</button>
                `;
                list.appendChild(card);
            });
        }

        document.getElementById('buscador').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtrados = inventario.filter(p => 
                (p.NOMBRE || p.nombre || "").toLowerCase().includes(term)
            );
            render(filtrados);
        });

        cargar();
    </script>
</body>
</html>
