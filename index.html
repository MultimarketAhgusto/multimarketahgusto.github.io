<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimarket Ahgusto - POS Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --sidebar-width: 260px; --primary: #1a3c5a; --accent: #d4a373; --success: #2e7d32; --danger: #c62828; --light: #fdfaf5; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background-color: var(--light); color: #333; overflow-x: hidden; }

        /* --- PORTADA --- */
        #portada { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; background: white; z-index: 1000; position: fixed; width: 100%; transition: 0.5s; }
        .logo-portada { width: 120px; margin-bottom: 20px; }
        .btn-acceso { padding: 15px 30px; border-radius: 30px; border: none; cursor: pointer; font-weight: 700; text-transform: uppercase; margin: 10px; transition: 0.3s; }
        .btn-acceso.cliente { background: var(--accent); color: white; }
        .btn-acceso.admin { background: var(--primary); color: white; }

        /* --- INTERFAZ --- */
        #interfaz-pos { display: none; }
        nav { width: var(--sidebar-width); height: 100vh; background: white; border-right: 1px solid #eee; position: fixed; padding: 20px 0; z-index: 10; }
        nav ul { list-style: none; padding: 0; }
        nav ul li { padding: 12px 30px; font-weight: 600; cursor: pointer; color: #555; border-left: 4px solid transparent; }
        nav ul li.active { background: #fff8ef; border-left-color: var(--accent); color: var(--accent); }

        .container { margin-left: var(--sidebar-width); padding: 20px 40px; }

        /* Buscador */
        .search-container { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        #barcode-input { flex-grow: 1; padding: 12px; border: 2px solid #eee; border-radius: 8px; font-size: 1rem; outline: none; }
        .modos-container { font-size: 0.7rem; font-weight: 700; padding: 5px 10px; border-radius: 15px; }
        .modo-admin { background: #ffebee; color: var(--danger); }
        .modo-cliente { background: #e3f2fd; color: #1565c0; }

        /* Grid de Productos */
        .grid-productos { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 15px; padding: 15px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; border: 2px solid transparent; }
        .precio-tag { background: var(--primary); color: white; padding: 4px 10px; border-radius: 5px; font-weight: 700; margin-bottom: 10px; display: inline-block; }
        .img-box { width: 100%; height: 130px; display: flex; align-items: center; justify-content: center; margin: 10px 0; }
        .img-producto { max-width: 100%; max-height: 100%; object-fit: contain; }
        .stock-tag { font-size: 0.75rem; font-weight: 700; margin-bottom: 10px; }
        .con-stock { color: var(--success); }
        .sin-stock { color: var(--danger); }
        .btn-accion { width: 100%; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; background: #e0f2f1; color: #00796b; }

        /* Modales y Toast */
        #modal-producto { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 500px; }
        .modal-group { margin-bottom: 15px; }
        .modal-group label { display: block; font-size: 0.75rem; font-weight: 700; color: #666; }
        .modal-group input, .modal-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 15px 25px; border-radius: 8px; color: white; font-weight: 700; transform: translateY(100px); transition: 0.3s; z-index: 3000; }
        .toast.show { transform: translateY(0); }
    </style>
</head>
<body>

    <div id="portada">
        <img src="logo.png" class="logo-portada" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3081/3081840.png'">
        <h1>Ahgusto Multimarket</h1>
        <p>Control de Inventario en la Nube</p>
        <div>
            <button class="btn-acceso cliente" onclick="iniciarApp('cliente')">👤 Modo Comprador</button>
            <button class="btn-acceso admin" onclick="iniciarApp('admin')">🔒 Modo Administrador</button>
        </div>
    </div>

    <div id="interfaz-pos">
        <nav>
            <img src="logo.png" style="width: 60px; display: block; margin: 0 auto 20px;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3081/3081840.png'">
            <ul id="menu-categorias">
                <li class="active" onclick="filtrar('Todas')">Todas las categorías</li>
            </ul>
        </nav>

        <div class="container">
            <div class="search-container">
                <input type="text" id="barcode-input" placeholder="Escanea código de barras o escribe..." autocomplete="off">
                <div id="status-modo" class="modos-container"></div>
            </div>
            <div id="contenedor-tienda"></div>
        </div>
    </div>

    <div id="modal-producto">
        <div class="modal-content">
            <h2 id="modal-titulo">Producto</h2>
            <div class="modal-group"><label>CÓDIGO</label><div id="m-cod" style="font-weight:700; background:#eee; padding:10px;"></div></div>
            <div class="modal-group"><label>NOMBRE</label><input type="text" id="m-nombre"></div>
            <div class="modal-group"><label>PRECIO (S/)</label><input type="number" id="m-precio" step="0.01"></div>
            <div class="modal-group"><label>STOCK</label><input type="number" id="m-stock"></div>
            <div class="modal-group"><label>CATEGORÍA</label>
                <select id="m-categoria">
                    <option value="Abarrotes">Abarrotes</option>
                    <option value="Bebidas">Bebidas</option>
                    <option value="Limpieza">Limpieza</option>
                    <option value="General">General</option>
                </select>
            </div>
            <div style="display:flex; gap:10px; justify-content:flex-end;">
                <button onclick="cerrarModal()" style="border:none; background:none; cursor:pointer;">Cancelar</button>
                <button class="btn-acceso admin" onclick="guardarFirebase()">Guardar en Nube</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDybKf865VmsfTbWjRRAWH74fgXXKmmOsY",
            authDomain: "multimarket-ahgusto.firebaseapp.com",
            databaseURL: "https://multimarket-ahgusto-default-rtdb.firebaseio.com",
            projectId: "multimarket-ahgusto",
            storageBucket: "multimarket-ahgusto.firebasestorage.app",
            messagingSenderId: "261327080583",
            appId: "1:261327080583:web:5a998fa8ed699d35e2fc22"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let productos = [];
        let modo = 'cliente';

        function iniciarApp(m) {
            modo = m;
            document.getElementById('portada').style.display = 'none';
            document.getElementById('interfaz-pos').style.display = 'flex';
            const s = document.getElementById('status-modo');
            s.textContent = modo === 'admin' ? "MODO ADMIN" : "MODO CLIENTE";
            s.className = `modos-container ${modo === 'admin' ? 'modo-admin' : 'modo-cliente'}`;
            escucharNube();
            document.getElementById('barcode-input').focus();
        }

        function escucharNube() {
            db.ref('inventario').on('value', (snap) => {
                const data = snap.val();
                productos = data ? Object.values(data) : [];
                dibujarTienda(productos);
                actualizarMenu();
            });
        }

        function dibujarTienda(lista) {
            const cont = document.getElementById('contenedor-tienda');
            cont.innerHTML = "";
            const cats = [...new Set(lista.map(p => p.CATEGORIA || 'General'))];
            
            cats.forEach(c => {
                const sec = document.createElement('div');
                sec.innerHTML = `<h2 style="border-bottom:2px solid var(--accent); margin-top:30px;">${c}</h2>`;
                const grid = document.createElement('div');
                grid.className = 'grid-productos';
                
                lista.filter(p => (p.CATEGORIA || 'General') === c).forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.id = `card-${p.Código}`;
                    card.innerHTML = `
                        <div class="precio-tag">S/ ${parseFloat(p.P_Venta).toFixed(2)}</div>
                        <div class="img-box"><img src="https://world.openfoodfacts.org/images/products/${p.Código}/front_es.200.jpg" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3081/3081840.png'" class="img-producto"></div>
                        <div class="stock-tag ${p.Stock > 0 ? 'con-stock' : 'sin-stock'}">Stock: ${p.Stock}</div>
                        <h3>${p.Nombre}</h3>
                        <button class="btn-accion" onclick="accion('${p.Código}')">${modo === 'admin' ? 'EDITAR' : 'AGREGAR'}</button>
                    `;
                    grid.appendChild(card);
                });
                sec.appendChild(grid);
                cont.appendChild(sec);
            });
        }

        function accion(cod) {
            if (modo === 'admin') {
                const p = productos.find(x => x.Código == cod);
                document.getElementById('modal-titulo').textContent = "Editar Producto";
                document.getElementById('m-cod').textContent = cod;
                document.getElementById('m-nombre').value = p.Nombre;
                document.getElementById('m-precio').value = p.P_Venta;
                document.getElementById('m-stock').value = p.Stock;
                document.getElementById('m-categoria').value = p.CATEGORIA;
                document.getElementById('modal-producto').style.display = 'flex';
            } else {
                msg("Producto seleccionado", "var(--primary)");
            }
        }

        function guardarFirebase() {
            const cod = document.getElementById('m-cod').textContent;
            const data = {
                Nombre: document.getElementById('m-nombre').value,
                P_Venta: document.getElementById('m-precio').value,
                Stock: document.getElementById('m-stock').value,
                CATEGORIA: document.getElementById('m-categoria').value,
                Código: cod
            };
            db.ref('inventario/' + cod).set(data).then(() => {
                msg("✅ Nube actualizada", "var(--success)");
                cerrarModal();
            });
        }

        document.getElementById('barcode-input').addEventListener('input', (e) => {
            const val = e.target.value;
            const p = productos.find(x => x.Código == val);
            if (p) {
                const card = document.getElementById(`card-${val}`);
                card.scrollIntoView({behavior: 'smooth', block: 'center'});
                card.style.borderColor = 'var(--accent)';
                setTimeout(() => card.style.borderColor = 'transparent', 2000);
                e.target.value = "";
            } else if (modo === 'admin' && val.length >= 8) {
                document.getElementById('modal-titulo').textContent = "Nuevo Producto";
                document.getElementById('m-cod').textContent = val;
                document.getElementById('m-nombre').value = "";
                document.getElementById('modal-producto').style.display = 'flex';
            }
        });

        function cerrarModal() { document.getElementById('modal-producto').style.display = 'none'; }
        
        function msg(m, c) {
            const t = document.getElementById('toast');
            t.textContent = m;
            t.style.background = c;
            t.className = "toast show";
            setTimeout(() => t.className = "toast", 2000);
        }

        function actualizarMenu() {
            const menu = document.getElementById('menu-categorias');
            const cats = [...new Set(productos.map(p => p.CATEGORIA || 'General'))];
            menu.innerHTML = `<li class="active" onclick="dibujarTienda(productos)">Todas las categorías</li>`;
            cats.forEach(c => {
                const li = document.createElement('li');
                li.textContent = c;
                li.onclick = () => dibujarTienda(productos.filter(p => p.CATEGORIA === c));
                menu.appendChild(li);
            });
        }
    </script>
</body>
</html>
