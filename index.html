<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimarket Ahgusto - Inventario Completo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #1a3c5a; --a: #d4a373; --bg: #fdfaf5; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); display: flex; color: #333; }
        
        nav { width: 260px; height: 100vh; background: white; border-right: 1px solid #ddd; padding: 20px; position: fixed; box-sizing: border-box; }
        .main { margin-left: 260px; padding: 30px; width: calc(100% - 260px); }
        
        .search-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: sticky; top: 20px; z-index: 100; }
        #barcode-input { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 1.2rem; outline: none; box-sizing: border-box; }
        
        .status { padding: 12px; border-radius: 8px; font-weight: bold; font-size: 0.85rem; margin-top: 20px; text-align: center; }
        .ready { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: white; border-radius: 12px; padding: 15px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .price { background: var(--p); color: white; padding: 4px 10px; border-radius: 5px; font-weight: bold; display: inline-block; margin-bottom: 8px; }
        .img-prod { width: 100%; height: 120px; object-fit: contain; margin-bottom: 10px; }
        h3 { font-size: 0.85rem; margin: 5px 0; height: 35px; overflow: hidden; line-height: 1.2; }
        .code { font-size: 0.7rem; color: #999; font-family: monospace; }
    </style>
</head>
<body>

    <nav>
        <h2 style="color: var(--p); margin-top: 0;">🛒 Ahgusto</h2>
        <p style="font-size: 0.8rem; color: #666;">Panel de Control</p>
        <div id="status-db" class="status">Cargando base de datos...</div>
        <div style="margin-top: 30px; font-size: 0.75rem; color: #888;">
            <b>Escáner activo:</b> El buscador filtrará automáticamente al detectar un código de barras.
        </div>
    </nav>

    <div class="main">
        <div class="search-box">
            <input type="text" id="barcode-input" placeholder="Escanea o escribe nombre del producto..." autofocus>
        </div>
        <div id="tienda" class="grid"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDybKf865VmsfTbWjRRAWH74fgXXKmmOsY",
            authDomain: "multimarket-ahgusto.firebaseapp.com",
            databaseURL: "https://multimarket-ahgusto-default-rtdb.firebaseio.com",
            projectId: "multimarket-ahgusto",
            storageBucket: "multimarket-ahgusto.firebasestorage.app",
            messagingSenderId: "261327080583",
            appId: "1:261327080583:web:5a998fa8ed699d35e2fc22"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let productos = [];

        // CARGA MASIVA OPTIMIZADA
        db.ref('/').on('value', (snapshot) => {
            const rawData = snapshot.val();
            if (rawData) {
                // Convertimos a array asegurando que NO se pierdan datos por estructura
                productos = Object.keys(rawData).map(key => rawData[key]).filter(p => {
                    return p && (p.Nombre || p.Código || p.Codigo);
                });

                const statusDiv = document.getElementById('status-db');
                statusDiv.innerText = "✅ " + productos.length + " PRODUCTOS CARGADOS";
                statusDiv.className = "status ready";
                
                render(productos);
            }
        });

        // BUSCADOR INSTANTÁNEO
        document.getElementById('barcode-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().trim();
            if (term === "") { render(productos); return; }

            const filtered = productos.filter(p => {
                const n = String(p.Nombre || "").toLowerCase();
                const c = String(p.Código || p.Codigo || "");
                return n.includes(term) || c.includes(term);
            });
            render(filtered);
        });

        function render(lista) {
            const container = document.getElementById('tienda');
            container.innerHTML = "";
            
            // Limitamos el render inicial a 200 para que no se pegue la página, 
            // pero el buscador encontrará cualquiera de los 1057.
            const totalAMostrar = lista.length;
            const items = lista.slice(0, 500); // Mostramos los primeros 500 por fluidez

            items.forEach(p => {
                const cod = p.Código || p.Codigo;
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="price">S/ ${parseFloat(p.P_Venta || 0).toFixed(2)}</div>
                    <img src="https://world.openfoodfacts.org/images/products/${cod}/front_es.200.jpg" 
                         onerror="this.src='https://cdn-icons-png.flaticon.com/512/3081/3081840.png'" 
                         class="img-prod">
                    <h3>${p.Nombre || 'Sin nombre'}</h3>
                    <div class="code">${cod}</div>
                `;
                container.appendChild(card);
            });

            if (totalAMostrar > 500) {
                const aviso = document.createElement('p');
                aviso.style = "grid-column: 1/-1; text-align: center; color: #888; font-size: 0.8rem;";
                aviso.innerText = "Mostrando 500 de " + totalAMostrar + " productos. Usa el buscador para encontrar el resto.";
                container.appendChild(aviso);
            }
        }
    </script>
</body>
</html>
